<div class="setup-wrapper">

  <!-- ── Header ── -->
  <header class="setup-header" aria-label="Kitchen Book">
    <div class="setup-header-brand">
      <div class="setup-logo-wrap">
        <img src="assets/images/DarkKitchenbookLogo.png" alt="Kitchen Book" />
      </div>
      <div class="setup-header-text">
        <span class="brand-name">Kitchen <em>Book</em></span>
        <span class="brand-tagline">— CLOUD KITCHEN ERP —</span>
      </div>
    </div>
    <div class="plan-chip" *ngIf="planName">
      <span class="material-icons">verified</span>
      {{ planName }} Plan Active
    </div>
  </header>

  <div class="setup-card">

    <!-- ── Restaurant Info Banner ── -->
    <div class="restaurant-banner">
      <div class="banner-heading">
        <span class="material-icons">store</span>
        <h3>Restaurant Details</h3>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="r-name">Restaurant Name *</label>
          <input id="r-name" type="text" [(ngModel)]="restaurant.restaurantName"
                 name="restaurantName" placeholder="e.g. Spice Garden" required />
        </div>
        <div class="form-group">
          <label for="r-phone">Phone *</label>
          <input id="r-phone" type="tel" [(ngModel)]="restaurant.phone"
                 name="phone" placeholder="Contact number" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="r-email">Email</label>
          <input id="r-email" type="email" [(ngModel)]="restaurant.email"
                 name="email" placeholder="restaurant@email.com" />
        </div>
        <div class="form-group">
          <label for="r-address">Address</label>
          <input id="r-address" type="text" [(ngModel)]="restaurant.address"
                 name="address" placeholder="Full address" />
        </div>
      </div>
      <div class="banner-location" *ngIf="onboardingContact?.city">
        <span class="material-icons">location_on</span>
        {{ onboardingContact?.city }}, {{ onboardingContact?.state }}
      </div>
    </div>

        </span>

    <!-- ── Error Banner ── -->
    <div class="error-banner" *ngIf="saveError">
      <span class="material-icons">error_outline</span>
      {{ saveError }}
    </div>

    <!-- ── Actions ── -->
    <div class="setup-actions">
      <button class="btn-complete" (click)="completeSetup()"
              [disabled]="isLoading || !restaurant.restaurantName || !restaurant.phone">
        <span class="material-icons spin" *ngIf="isLoading">autorenew</span>
        <span>{{ isLoading ? 'Saving...' : 'Complete Setup' }}</span>
        <span class="material-icons" *ngIf="!isLoading">check_circle</span>
      </button>
    </div>
