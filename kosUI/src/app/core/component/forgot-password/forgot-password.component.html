<div class="fp-overlay" (click)="onOverlayClick($event)">
  <div class="fp-card" role="dialog" aria-modal="true" aria-labelledby="fp-title">

    <!-- Header -->
    <div class="fp-header">
      <div class="fp-icon">
        <span class="material-icons">lock_reset</span>
      </div>
      <h2 id="fp-title">Reset Password</h2>
      <p>Enter your registered email or mobile to receive a reset link.</p>
      <button class="fp-close" type="button" (click)="close.emit()" aria-label="Close">
        <span class="material-icons">close</span>
      </button>
    </div>

    <!-- Step 1: Enter identifier -->
    <ng-container *ngIf="step === 1">
      <div class="fp-body">
        <div class="form-group">
          <label for="fp-identifier">Email / Mobile</label>
          <div class="input-wrapper">
            <span class="material-icons input-icon">alternate_email</span>
            <input
              id="fp-identifier"
              type="text"
              [(ngModel)]="identifier"
              placeholder="Enter email or mobile number"
              [disabled]="isLoading"
              (keyup.enter)="submit()" />
          </div>
        </div>

        <div class="error-msg" *ngIf="errorMsg">
          <span class="material-icons">error_outline</span>
          {{ errorMsg }}
        </div>

        <button class="fp-btn-primary" type="button" (click)="submit()" [disabled]="isLoading">
          <span class="material-icons spin" *ngIf="isLoading">autorenew</span>
          <span>{{ isLoading ? 'Sending...' : 'Send Reset Link' }}</span>
          <span class="material-icons" *ngIf="!isLoading">send</span>
        </button>
      </div>
    </ng-container>

    <!-- Step 2: Success -->
    <ng-container *ngIf="step === 2">
      <div class="fp-body fp-success">
        <div class="success-icon">
          <span class="material-icons">mark_email_read</span>
        </div>
        <p class="success-title">Reset link sent!</p>
        <p class="success-desc">
          Check <strong>{{ identifier }}</strong> for the password reset link.
          It may take a few minutes.
        </p>
        <button class="fp-btn-primary" type="button" (click)="close.emit()">
          <span class="material-icons">check</span>
          Done
        </button>
      </div>
    </ng-container>

    <!-- Footer -->
    <div class="fp-footer">
      <span>Remember your password?</span>
      <button type="button" class="fp-link" (click)="close.emit()">Back to Sign In</button>
    </div>

  </div>
</div>
