<div class="reset-page">
  <div class="reset-card">

    <div class="reset-icon">
      <span class="material-icons">lock_reset</span>
    </div>

    <h2>Set Your Password</h2>
    <p class="subtitle">
      Hello <strong>{{ displayName }}</strong>, you're using a temporary password.
      Please set a new password to continue.
    </p>

    <form (ngSubmit)="onSubmit()" #form="ngForm" autocomplete="off">

      <!-- New Password -->
      <div class="field-group">
        <label>New Password</label>
        <div class="input-wrap">
          <span class="material-icons field-icon">lock</span>
          <input
            [type]="showNew ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Enter new password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="toggle-btn" (click)="showNew = !showNew" tabindex="-1">
            <span class="material-icons">{{ showNew ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <span class="material-icons field-icon">lock_outline</span>
          <input
            [type]="showConfirm ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter new password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="toggle-btn" (click)="showConfirm = !showConfirm" tabindex="-1">
            <span class="material-icons">{{ showConfirm ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <p class="error-msg"   *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Update Password</span>
        <span *ngIf="isLoading" class="material-icons spin">sync</span>
      </button>

    </form>

  </div>
</div>
