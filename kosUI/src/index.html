<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kitchen Book</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/images/IconKitchenbooktransparent.png" id="app-favicon">
  <script>
    (function () {
      var img = new Image();
      img.onload = function () {
        // Find the actual content bounds by scanning non-transparent pixels
        var scan = document.createElement('canvas');
        scan.width = img.width; scan.height = img.height;
        var sctx = scan.getContext('2d');
        sctx.drawImage(img, 0, 0);
        var data = sctx.getImageData(0, 0, img.width, img.height).data;
        var minX = img.width, minY = img.height, maxX = 0, maxY = 0;
        for (var y = 0; y < img.height; y++) {
          for (var x = 0; x < img.width; x++) {
            if (data[(y * img.width + x) * 4 + 3] > 10) {
              if (x < minX) minX = x; if (x > maxX) maxX = x;
              if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
          }
        }
        // Draw cropped icon scaled to 64x64
        var c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        var ctx = c.getContext('2d');
        var pad = 2;
        var r = 12;
        // Rounded white background
        ctx.beginPath();
        ctx.moveTo(r, 0); ctx.lineTo(64 - r, 0);
        ctx.quadraticCurveTo(64, 0, 64, r);
        ctx.lineTo(64, 64 - r);
        ctx.quadraticCurveTo(64, 64, 64 - r, 64);
        ctx.lineTo(r, 64);
        ctx.quadraticCurveTo(0, 64, 0, 64 - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.clip();
        ctx.drawImage(img, minX - pad, minY - pad,
          (maxX - minX + pad * 2), (maxY - minY + pad * 2),
          0, 0, 64, 64);
        var link = document.getElementById('app-favicon');
        if (link) link.href = c.toDataURL('image/png');
      };
      img.src = 'assets/images/IconKitchenbooktransparent.png';
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
